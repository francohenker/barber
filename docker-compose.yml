version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: barberia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-barberia_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barberia_pass}
      POSTGRES_DB: ${POSTGRES_DB:-barberia_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-barberia_user} -d ${POSTGRES_DB:-barberia_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: barberia_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@barberia.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
